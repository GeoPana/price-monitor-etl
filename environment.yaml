# Conda environment definition for local development.
name: price-monitor-etl
channels:
  - conda-forge
dependencies:
  # Keep Python aligned with the package requirement declared in pyproject.toml.
  - python=3.11
  - pip
  # Core runtime dependencies.
  - pydantic>=2.7,<3.0
  - pyyaml>=6.0
  - sqlalchemy>=2.0,<3.0
  - psycopg>=3.1,<4.0
  - requests>=2.31,<3.0
  - python-dotenv>=1.0,<2.0
  - playwright>=1.52,<2.0,
  # Test dependency included here for a ready-to-run local dev environment.
  - pytest>=8.0,<9.0
