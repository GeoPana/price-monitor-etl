# Conda environment definition for local development.
name: price-monitor-etl
channels:
  - conda-forge
dependencies:
  # Keep Python aligned with the package requirement declared in pyproject.toml.
  - python=3.11
  - pip
  
  # Core runtime dependencies.
  - pydantic>=2.7,<3.0
  - pyyaml>=6.0
  - sqlalchemy>=2.0,<3.0
  - psycopg>=3.1,<4.0
  - requests>=2.31,<3.0
  - python-dotenv>=1.0,<2.0
  - playwright>=1.52,<2.0
  - alembic>=1.18,<1.19
  - fastapi>=0.115,<1.0
  
  # Dev dependencies for tests and local API serving.
  - pytest>=8.0,<9.0
  - httpx>=0.27,<1.0
  - uvicorn>=0.30,<1.0
